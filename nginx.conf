# Catch-all: qualquer acesso por IP ou domínio desconhecido vai pro site principal
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://crmvere.com.br$request_uri;
}

# Redirecionamento HTTP -> HTTPS para os domínios conhecidos
server {
    listen 80;
    server_name crmvere.com.br www.crmvere.com.br app.crmvere.com.br api.crmvere.com.br wa.crmvere.com.br;
    return 301 https://$host$request_uri;
}

# App (Frontend)
server {
    listen 443 ssl;
    server_name crmvere.com.br www.crmvere.com.br app.crmvere.com.br;

    ssl_certificate     /etc/letsencrypt/live/crmvere.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crmvere.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API (Backend)
server {
    listen 443 ssl;
    server_name api.crmvere.com.br;

    ssl_certificate     /etc/letsencrypt/live/crmvere.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crmvere.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# WhatsApp (Evolution)
