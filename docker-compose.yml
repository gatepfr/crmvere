services:
  db:
    image: postgres:17-alpine
    container_name: vereador_crm_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vereador_crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vereador_crm_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
