server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy para evitar problemas de CORS em certas situações, opcional
    # location /api {
    #     proxy_pass http://backend:3001;
    # }
}
