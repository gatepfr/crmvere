# Redirecionamento Global de HTTP para HTTPS
server {
    listen 80;
    server_name crmvere.com.br www.crmvere.com.br app.crmvere.com.br api.crmvere.com.br wa.crmvere.com.br;
    
    # Redireciona qualquer requisição HTTP para HTTPS
    return 301 https://$host$request_uri;
}

# Configuração para o Frontend (App)
server {
    listen 443 ssl;
    server_name crmvere.com.br www.crmvere.com.br app.crmvere.com.br;

    # Aqui você deve ter seus certificados SSL (Certbot/LetsEncrypt)
    # ssl_certificate /etc/letsencrypt/live/crmvere.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/crmvere.com.br/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Configuração para o API (Backend)
server {
    listen 443 ssl;
    server_name api.crmvere.com.br;

    location / {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Configuração para o WhatsApp (Evolution)
server {
    listen 443 ssl;
    server_name wa.crmvere.com.br;

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
